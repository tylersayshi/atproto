# laugh.town PDS image build & push to atcr.io
#
# Tag-gated deploy: pushing a git tag `vX.Y.Z` publishes `:latest` (+ `:vX.Y.Z`, `:sha-<short>`),
# which makes atcr fire its "Image push" webhook -> the deployer on the bag box pulls & restarts.
# Pushes to `main` build only a traceable `:sha-<short>` image and do NOT deploy.
name: build-push-pds

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-push-pds
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to atcr.io
        uses: docker/login-action@v3
        with:
          registry: atcr.io
          username: ${{ secrets.ATCR_HANDLE }}        # laugh.town
          password: ${{ secrets.ATCR_APP_PASSWORD }}  # a laugh.town app password (CI-only)

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: atcr.io/laugh.town/pds
          tags: |
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root — the Dockerfile COPYs many workspace packages
          file: services/pds/Dockerfile    # canonical PDS image build, inherited from upstream
          platforms: linux/amd64           # bag box is amd64; add linux/arm64 only if that changes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
