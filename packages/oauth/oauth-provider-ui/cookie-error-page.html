<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock - OAuth Provider</title>
  </head>
  <body class="text-text-default bg-contrast-0">
    <div id="root"></div>
    <script>
      /*
       * This file's purpose is to provide a way to develop the UI without
       * running a full featured OAuth server. It mocks the server responses and
       * provides configuration data to the UI.
       *
       * This file is not part of the production build.
       *
       * Start the development server with the following command from the
       * oauth-provider root:
       *
       * ```sh
       * pnpm run start:ui
       * ```
       *
       * Then open the browser at http://localhost:5173/
       */
    </script>
    <style>
      :root {
        --branding-color-primary: 223 32 46;
        --branding-color-primary-contrast: 255 255 255;
        --branding-color-primary-hue: 25;

        --branding-color-error: 162 10 1;
        --branding-color-error-contrast: 255 255 255;
        --branding-color-error-hue: 30;

        --branding-color-warning: 234 171 5;
        --branding-color-warning-contrast: 24 22 17;
        --branding-color-warning-hue: 82;

        --branding-color-success: 56 133 62;
        --branding-color-success-contrast: 255 255 255;
        --branding-color-success-hue: 145;
      }
    </style>
    <script type="module">
      /*
       * PDS branding configuration
       */

      const name = 'laugh.town'
      const links = [
        {
          title: { en: 'Home', fr: 'Accueil', ja: 'ホーム' },
          href: 'https://laugh.town/',
          rel: 'canonical', // prevents the login page from being indexed by search engines
        },
        {
          title: { en: 'Terms of Service', ja: '利用規約' },
          href: 'https://laugh.town/terms',
          rel: 'terms-of-service',
        },
        {
          title: { en: 'Privacy Policy', ja: 'プライバシーポリシー' },
          href: 'https://laugh.town/terms',
          rel: 'privacy-policy',
        },
        {
          title: { en: 'Support', ja: 'サポート' },
          href: 'mailto:help@laugh.town',
          rel: 'help',
        },
      ]
      const logo = 'https://laugh.town/cdn/img/brand/pds-logo.webp'

      // Provide a value here to test the "sign-in only" flow
      const loginHint = undefined // 'alice.test'

      // Use empty array to disable the "sign-up" flow, use a single value to
      // disable the domain selector.
      const availableUserDomains = ['.laugh.town']

      // Use non empty string to enable hCaptcha during "sign-up" flow
      const hcaptchaSiteKey = undefined

      /*
       * Client branding configuration
       */

      // Use an "http://" URL to test the "an app on your device" flow
      const clientId = 'https://example.com/client.json'
      const clientName = 'My App'
      const clientPolicyUri = 'https://bsky.app'
      const clientTosUri = 'https://bsky.app'
      const clientLogoUri = 'https://bsky.app'

      // Mock data

      const requestUri = 'foo-bar'

      window.__customizationData = {
        availableUserDomains,
        inviteCodeRequired: false,
        hcaptchaSiteKey,
        name,
        links,
        logo,
      }

      window.__continueUrl =
        'https://example.com/callback?request_uri=' + requestUri
    </script>
    <script src="./src/cookie-error-page.tsx" type="module"></script>
  </body>
</html>
